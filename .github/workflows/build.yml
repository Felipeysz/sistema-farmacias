name: Build

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Localizar arquivo de solução (.sln ou .slnx)
        id: check
        working-directory: backend
        run: |
          SLN_FILE=$(find . -maxdepth 1 \( -name "*.sln" -o -name "*.slnx" \) | head -1)
          if [ -n "$SLN_FILE" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "sln=${SLN_FILE#./}" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Nenhum .sln ou .slnx encontrado em backend/ — pulando build."
          fi

      - name: Configurar .NET SDK
        if: steps.check.outputs.found == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restaurar dependências
        if: steps.check.outputs.found == 'true'
        working-directory: backend
        run: dotnet restore "${{ steps.check.outputs.sln }}"

      - name: Build
        if: steps.check.outputs.found == 'true'
        working-directory: backend
        run: dotnet build "${{ steps.check.outputs.sln }}" --no-restore --configuration Release
